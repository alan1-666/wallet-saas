syntax = "proto3";

package wallet.chaingateway;

service ChainGatewayService {
  rpc ConvertAddress(ConvertAddressRequest) returns (ConvertAddressResponse);
  rpc BuildUnsignedTx(BuildUnsignedTxRequest) returns (BuildUnsignedTxResponse);
  rpc SendTx(SendTxRequest) returns (SendTxResponse);
  rpc ListIncomingTransfers(ListIncomingTransfersRequest) returns (ListIncomingTransfersResponse);
  rpc GetTxFinality(TxFinalityRequest) returns (TxFinalityResponse);
  rpc GetBalance(BalanceRequest) returns (BalanceResponse);
}

message TxVin {
  string hash = 1;
  uint32 index = 2;
  int64 amount = 3;
  string address = 4;
}

message TxVout {
  string address = 1;
  int64 amount = 2;
  uint32 index = 3;
}

message ConvertAddressRequest {
  string chain = 1;
  string type = 2;
  string public_key = 3;
  string network = 4;
}

message ConvertAddressResponse {
  string address = 1;
}

message BuildUnsignedTxRequest {
  string chain = 1;
  string network = 2;
  string coin = 3;
  string base64_tx = 4;
  string fee = 5;
  repeated TxVin vin = 6;
  repeated TxVout vout = 7;
}

message BuildUnsignedTxResponse {
  string unsigned_tx = 1;
  repeated string sign_hashes = 2;
}

message SendTxRequest {
  string chain = 1;
  string network = 2;
  string coin = 3;
  string raw_tx = 4;
  string unsigned_tx = 5;
  repeated string signatures = 6;
  repeated string public_keys = 7;
}

message SendTxResponse {
  string tx_hash = 1;
}

message ListIncomingTransfersRequest {
  string model = 1;
  string chain = 2;
  string coin = 3;
  string network = 4;
  string address = 5;
  uint32 page = 6;
  uint32 page_size = 7;
  string cursor = 8;
}

message IncomingTransfer {
  string tx_hash = 1;
  string from_address = 2;
  string to_address = 3;
  string amount = 4;
  int64 confirmations = 5;
  int64 index = 6;
  string status = 7;
}

message ListIncomingTransfersResponse {
  repeated IncomingTransfer items = 1;
  string next_cursor = 2;
}

message TxFinalityRequest {
  string chain = 1;
  string coin = 2;
  string network = 3;
  string tx_hash = 4;
}

message TxFinalityResponse {
  string tx_hash = 1;
  int64 confirmations = 2;
  string status = 3;
  bool found = 4;
}

message BalanceRequest {
  string chain = 1;
  string coin = 2;
  string network = 3;
  string address = 4;
  string contract_address = 5;
}

message BalanceResponse {
  string balance = 1;
  string network = 2;
  string sequence = 3;
}
