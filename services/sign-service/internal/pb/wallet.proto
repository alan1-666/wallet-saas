syntax = "proto3";

option go_package = "./pb;wallet";
package dapplink.wallet;

message PublicKey {
  string compressed_hex = 1;
  string uncompressed_hex = 2;
}

message GetSupportSignWayRequest {
  string sign_type = 1;
}

message GetSupportSignWayResponse {
  bool support = 1;
  string message = 2;
}

message DeriveKeyRequest {
  string key_id = 1;
  string sign_type = 2;
}

message DeriveKeyResponse {
  string key_id = 1;
  string sign_type = 2;
  string derivation_path = 3;
  PublicKey public_key = 4;
  bool public_derivation_supported = 5;
  PublicKey account_public_key = 6;
  string account_chain_code = 7;
  string account_derivation_path = 8;
  string custody_scheme = 9;
}

message SignMessageRequest {
  string key_id = 1;
  string sign_type = 2;
  string message_hash = 3;
}

message SignMessageResponse {
  string signature = 1;
  string message = 2;
  string custody_scheme = 3;
}

service WalletService {
  rpc GetSupportSignWay(GetSupportSignWayRequest) returns (GetSupportSignWayResponse) {}
  rpc DeriveKey(DeriveKeyRequest) returns (DeriveKeyResponse) {}
  rpc SignMessage(SignMessageRequest) returns (SignMessageResponse) {}
}
