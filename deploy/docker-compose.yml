services:
  api-gateway:
    image: golang:1.26
    working_dir: /app/services/api-gateway
    command: sh -lc "export PATH=/usr/local/go/bin:$PATH && go run ./cmd"
    environment:
      API_GATEWAY_ADDR: ":8080"
      WALLET_CORE_HTTP_ADDR: "http://wallet-core:8081"
      GOCACHE: "/tmp/gocache"
      GOMODCACHE: "/tmp/gomodcache"
      GOPROXY: "https://proxy.golang.org,direct"
    volumes:
      - ../:/app
    ports:
      - "8080:8080"
    depends_on:
      - wallet-core

  wallet-core:
    image: golang:1.26
    working_dir: /app/services/wallet-core
    command: sh -lc "export PATH=/usr/local/go/bin:$PATH && go run ./cmd"
    environment:
      WALLET_CORE_HOST: "0.0.0.0"
      WALLET_CORE_PORT: "8081"
      SIGN_SERVICE_ADDR: "sign-service:9091"
      CHAIN_GATEWAY_HTTP_ADDR: "http://chain-gateway:8082"
      CHAIN_GATEWAY_GRPC_ADDR: "chain-gateway:9082"
      WALLET_DB_DSN: "postgres://wallet:wallet@postgres:5432/wallet?sslmode=disable"
      RISK_MAX_WITHDRAW_AMOUNT: "1000000000000"
      GOCACHE: "/tmp/gocache"
      GOMODCACHE: "/tmp/gomodcache"
      GOPROXY: "https://proxy.golang.org,direct"
    volumes:
      - ../:/app
    ports:
      - "8081:8081"
    depends_on:
      - sign-service
      - chain-gateway
      - postgres

  chain-gateway:
    image: golang:1.26
    working_dir: /app/services/chain-gateway
    command: sh -lc "export PATH=/usr/local/go/bin:$PATH && go run ./cmd"
    environment:
      CHAIN_GATEWAY_ADDR: ":8082"
      CHAIN_GATEWAY_GRPC_ADDR: ":9082"
      CHAIN_ACCOUNT_CONFIG_PATH: "/app/legacy/wallet-chain-account/config.yml"
      CHAIN_UTXO_CONFIG_PATH: "/app/legacy/wallet-chain-utxo/config.yml"
      GOLANG_PROTOBUF_REGISTRATION_CONFLICT: "warn"
      GOCACHE: "/tmp/gocache"
      GOMODCACHE: "/tmp/gomodcache"
      GOPROXY: "https://proxy.golang.org,direct"
    volumes:
      - ../:/app
    ports:
      - "8082:8082"
      - "9082:9082"

  sign-service:
    image: golang:1.26
    working_dir: /app/services/sign-service
    command: sh -lc "export PATH=/usr/local/go/bin:$PATH && go run ./cmd"
    environment:
      SIGN_GRPC_HOST: "0.0.0.0"
      SIGN_GRPC_PORT: "9091"
      SIGN_LEVELDB_PATH: "/data/sign-leveldb"
      GOCACHE: "/tmp/gocache"
      GOMODCACHE: "/tmp/gomodcache"
      GOPROXY: "https://proxy.golang.org,direct"
    volumes:
      - ../:/app
      - sign_data:/data
    ports:
      - "9091:9091"

  scan-service:
    image: golang:1.26
    working_dir: /app/services/scan-service
    command: sh -lc "export PATH=/usr/local/go/bin:$PATH && go run ./cmd"
    environment:
      SCAN_DB_DSN: "postgres://wallet:wallet@postgres:5432/wallet?sslmode=disable"
      WALLET_CORE_HTTP_ADDR: "http://wallet-core:8081"
      CHAIN_GATEWAY_HTTP_ADDR: "http://chain-gateway:8082"
      SCAN_ETH_RPC_URL: "https://eth-sepolia.g.alchemy.com/v2/LKsuPrf-JVp3OUtc5khw_"
      SCAN_API_TOKEN: "token_t1_full"
      SCAN_INTERVAL_SECONDS: "5"
      SCAN_MIN_CONFIRMATIONS: "1"
      SCAN_ACCOUNT_PAGE_SIZE: "50"
      SCAN_ACCOUNT_MAX_PAGES: "2"
      SCAN_WATCH_LIMIT: "500"
      SCAN_ETH_LOOKBACK_BLOCKS: "300"
      SCAN_ETH_MAX_BLOCKS_PER_TICK: "80"
      GOCACHE: "/tmp/gocache"
      GOMODCACHE: "/tmp/gomodcache"
      GOPROXY: "https://proxy.golang.org,direct"
    volumes:
      - ../:/app
    depends_on:
      - postgres
      - wallet-core
      - chain-gateway

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
    ports:
      - "5432:5432"

volumes:
  sign_data:
